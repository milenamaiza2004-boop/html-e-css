<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
}

div:hover{
    color:red;
}

div > p{
    display:none;
}

div:hover > p{
    display: block;
    color: white;
    background-color: red;
}

</style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre este texto para ver o efeito de hover.</p>
    <div>
        Passe o mouse aqui
<p>texto escondido</p>
    </div>
</body>
</html>
