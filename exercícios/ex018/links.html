<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        /*# = id
        . = class
        : = pseudo-classe
        ::= pseudo-elemento
        > = filho*/

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            color: rgb(0, 255, 51);
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: rgb(0, 45, 128);
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color:blueviolet
        }

        .especial{
            background-color: aqua;
        }

        .especial::before{
            content: "→";
            text-decoration: none;
            font-weight: normal;
            color: grey;
        }

        .especial::after{
        content: "←";
        text-decoration: none;
        font-weight: normal;
        color: grey;
       }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
<li><a href="https://github.com/milenamaiza2004-boop" target="_blank" class="especial">Repositório GitHub</a></li>
<li><a href="https://www.instagram.com/miilena.tx?igsh=MXdhZzAxeWFjMHZyZQ%3D%3D&utm_source=qr" target="_blank" class="especial">Perfil Instagram</a></li>

    </ul>
</body>
</html>
