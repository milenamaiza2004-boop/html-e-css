<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{ /*box-level*/
            height: 300px;
            width: 300px;
            background-color: lightcoral;

            /*border-width: 10px;
            border-style: solid;
            border-color: brown;*/

            border: 10px solid brown;
        
            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/

            padding: 10px;

            /*margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 40px;
            margin-left: 10px;*/

            margin: 10px auto 40px auto;

            /*outline-width: 5px;
            outline-style: dashed;
            outline-color: blue;*/

            outline: 5px dashed blue;
        }

        a{ /*inline-level*/
            /*border-width: 10px;
            border-style: solid;
            border-color: brown;*/

            border: 10px solid brown;

            /*padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;*/

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixas box-level</h1>
    <p>Páragrafos também são exemplos de box-level, mas os <a href="#"> links são exemplos de inline-level</a> Vamos ver como tudo isso funciona.</p>
</body>
</html>
