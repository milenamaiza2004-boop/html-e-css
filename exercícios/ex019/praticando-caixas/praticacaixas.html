<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praticando Caixas</title>
<style>
p{
background-color: lightgreen;
font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
color: rgb(0, 0, 0);
width: 200px;
height: 200px;

border: 15px solid rgb(19, 142, 31);
padding: 15px;
margin: 20px auto;
outline: 20px solid rgb(32, 62, 34);
}

h2{
    border: 10px solid rgb(26, 151, 21);
    padding: 10px;

}


 a{
    background-color: rgb(14, 114, 108);
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    color: azure;

    border: 10px solid rgb(89, 133, 18);
    padding: 10px;
    margin: 20px;
 }

</style>

</head>
<body>
   <h1>Caixas na prática</h1> 
   <h2>Caixas do tipo block-level</h2>
   <p>Este é um páragrafo em uma caixa do tipo block level

   <h2>Caixas do tipo inline-level</h2>
   <a href="#">este é um link em uma caixa do tipo inline-level</a>
</body>
</html>
